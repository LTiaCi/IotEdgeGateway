<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK3568 智能控制中心</title>
    <style>
        :root {
            --primary: #5c67f2;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --bg: #f0f2f5;
            --card: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            padding: 0 25px;
            border-radius: 16px;
            min-height: 60px;
            margin-bottom: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .status-tag {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-btn {
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .header-btn:active {
            transform: scale(0.97);
        }

        /* 主区域布局 */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1f2937;
        }

        /* 视频区域 - 保留原样式，仅替换内部为video标签 */
        .video-box {
            width: 100%;
            background: #000;
            border-radius: 12px;
            flex: 1;
            overflow: hidden;
            position: relative;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        /* 按钮通用 */
        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 13px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-cap {
            background: var(--success);
        }

        .btn-rec {
            background: var(--danger);
        }

        .btn-stream-start {
            background: var(--info);
        }

        .btn-stream-stop {
            background: #64748b;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* 控制面板 */
        .control-item {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid #edf2f7;
        }

        .protocol-switch {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
            background: #f8fafc;
            border: 1px solid #edf2f7;
            border-radius: 12px;
            padding: 8px;
        }

        .protocol-btn {
            border: 1px solid transparent;
            background: #e2e8f0;
            color: #475569;
            border-radius: 8px;
            padding: 9px 8px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
        }

        .protocol-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: 600;
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--primary);
        }

        .dir-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-dir {
            background: #e2e8f0;
            color: #64748b;
            padding: 6px;
            border-radius: 6px;
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-dir.active {
            background: #fff;
            color: var(--primary);
            border-color: var(--primary);
            font-weight: bold;
        }

        /* 开关手柄 */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary);
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        /* 日志窗口 - 填满剩余空间 */
        .log-container {
            background: #0f172a;
            color: #38bdf8;
            border-radius: 12px;
            padding: 15px;
            flex: 1;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            line-height: 1.5;
            border: 1px solid #1e293b;
        }

        .log-line {
            margin-bottom: 4px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 2px;
        }

        .log-time {
            color: #94a3b8;
            margin-right: 8px;
        }

        /* 底部传感器卡片 */
        .sensor-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .s-card {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .s-val {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            margin: 4px 0;
        }

        .s-unit {
            font-size: 12px;
            color: #94a3b8;
        }

        .db-modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 50;
        }

        .db-modal.open {
            display: flex;
        }

        .db-panel {
            width: min(1280px, 100%);
            max-height: calc(100vh - 48px);
            min-height: 520px;
        }

        .db-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 15px;
        }

        .db-close {
            border: none;
            background: #e2e8f0;
            color: #334155;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            font-size: 20px;
            cursor: pointer;
        }

        .db-toolbar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .db-tab {
            border: 1px solid #dbe3f0;
            background: #f8fafc;
            color: #475569;
            border-radius: 8px;
            padding: 8px 6px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .db-tab.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .db-summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
            font-size: 12px;
            color: #475569;
        }

        .db-summary-item {
            background: #f8fafc;
            border: 1px solid #edf2f7;
            border-radius: 8px;
            padding: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .db-list {
            border: 1px solid #edf2f7;
            border-radius: 10px;
            overflow: auto;
            flex: 1;
            min-height: 0;
            background: #fff;
        }

        .db-row {
            display: grid;
            grid-template-columns: 150px 100px 1fr;
            gap: 10px;
            align-items: start;
            padding: 9px 10px;
            border-bottom: 1px solid #edf2f7;
            font-size: 12px;
        }

        .db-row:last-child {
            border-bottom: none;
        }

        .db-time {
            color: #64748b;
            white-space: nowrap;
        }

        .db-kind {
            color: #1f2937;
            font-weight: 700;
            word-break: break-all;
        }

        .db-detail {
            color: #475569;
            word-break: break-all;
        }

        .db-link {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            margin-right: 10px;
        }

        @media (max-width: 1050px) {
            body {
                height: auto;
            }

            .main-grid {
                grid-template-columns: 1fr;
            }

            .sensor-row,
            .db-summary {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 640px) {
            .video-bar,
            .sensor-row,
            .db-toolbar,
            .db-summary {
                grid-template-columns: 1fr 1fr;
            }

            .db-row {
                grid-template-columns: 1fr;
                gap: 4px;
            }

            .db-modal {
                padding: 10px;
            }

            .db-panel {
                max-height: calc(100vh - 20px);
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <div style="font-size: 20px; font-weight: 800; letter-spacing: 1px;">RK3568 智能网关控制系统</div>
        <div class="header-actions">
            <button class="header-btn" id="dbOpenBtn">数据库</button>
            <div class="status-tag" id="conn_status">● 设备在线</div>
        </div>
    </div>

    <div class="main-grid">
        <!-- 左侧 -->
        <div class="column">
            <div class="card" style="flex: 1;">
                <div class="card-title">🎥 实时画面监控</div>
                <div class="video-box">
                    <!-- 替换为video标签，移除原img -->
                    <video id="videoPlayer" muted playsinline></video>
                </div>
                <div class="video-bar">
                    <button id="streamStartBtn" class="btn btn-stream-start">▶ 开启视频</button>
                    <button id="streamStopBtn" class="btn btn-stream-stop" disabled>⏹ 关闭视频</button>
                    <button id="snapshotBtn" class="btn btn-cap">📸 抓拍照片</button>
                    <button id="recordBtn" class="btn btn-rec">🔴 视频录制</button>
                </div>
            </div>

            <div class="sensor-row">
                <div class="s-card">
                    <div>温度</div>
                    <div class="s-val" id="val_temp">--</div>
                    <div class="s-unit">°C</div>
                </div>
                <div class="s-card">
                    <div>湿度</div>
                    <div class="s-val" id="val_humi">--</div>
                    <div class="s-unit">% RH</div>
                </div>
                <div class="s-card">
                    <div>光照强度</div>
                    <div class="s-val" id="val_light">--</div>
                    <div class="s-unit">Lux</div>
                </div>
                <div class="s-card">
                    <div>红外检测</div>
                    <div class="s-val" id="val_ir" style="font-size:16px;">--</div>
                    <div class="s-unit">Status</div>
                </div>
            </div>

        </div>

        <!-- 右侧 -->
        <div class="column">
            <!-- 控制卡片 -->
            <div class="card">
                <div class="card-title">⚙️ 硬件外设控制</div>

                <div class="protocol-switch" aria-label="通讯方式切换">
                    <button class="protocol-btn active" id="protocolMqttBtn" type="button">MQTT</button>
                    <button class="protocol-btn" id="protocolZigbeeBtn" type="button">ZigBee</button>
                </div>

                <div class="control-item">
                    <div class="label-row"><span>LED 照明灯</span><label class="switch"><input type="checkbox" id="led_sw"
                                onchange="updateLed()"><span class="slider"></span></label></div>
                    <input type="range" id="led_br" value="50" min="0" max="100" oninput="scheduleLedUpdate()"
                        onchange="updateLed()">
                    <div class="s-unit"><span id="led_br_text">50</span>%</div>
                </div>

                <div class="control-item">
                    <div class="label-row"><span>直流电机控制</span><label class="switch"><input type="checkbox" id="motor_sw"
                                onchange="updateMotor()"><span class="slider"></span></label></div>
                    <input type="range" id="motor_sp" value="30" min="0" max="100" oninput="scheduleMotorUpdate()"
                        onchange="updateMotor()">
                    <div class="s-unit"><span id="motor_sp_text">30</span>%</div>
                    <div class="dir-btns">
                        <button id="dir_f" class="btn-dir active" onclick="setMotorDirUser(0)">正向旋转</button>
                        <button id="dir_r" class="btn-dir" onclick="setMotorDirUser(1)">反向旋转</button>
                    </div>
                </div>

                <div class="control-item" style="border-left: 4px solid var(--warning); margin-bottom: 0;">
                    <div class="label-row"><span>紧急蜂鸣报警</span><label class="switch"><input type="checkbox"
                                id="buzzer_sw" onchange="updateBuzzer()"><span
                                class="slider"></span></label></div>
                </div>
            </div>

            <!-- 日志卡片 -->
            <div class="card" style="flex: 1; min-height: 0;">
                <div class="card-title">📜 系统运行日志</div>
                <div class="log-container" id="log_box">
                    <div class="log-line"><span class="log-time">[00:00:00]</span>系统初始化完成...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="db-modal" id="dbModal">
        <div class="card db-panel">
            <div class="db-title-row">
                <div class="card-title" style="margin-bottom:0;">🗄️ 数据库记录</div>
                <button class="db-close" id="dbCloseBtn">×</button>
            </div>
            <div class="db-toolbar">
                <button class="db-tab active" data-db-tab="sensors">传感器</button>
                <button class="db-tab" data-db-tab="media">照片/视频</button>
                <button class="db-tab" data-db-tab="commands">控制命令</button>
                <button class="db-tab" data-db-tab="logs">运行日志</button>
            </div>
            <div class="db-summary" id="db_summary">
                <div class="db-summary-item">传感器: --</div>
                <div class="db-summary-item">媒体: --</div>
                <div class="db-summary-item">命令: --</div>
                <div class="db-summary-item">日志: --</div>
            </div>
            <div class="db-list" id="db_list">
                <div class="db-row">
                    <div class="db-time">--</div>
                    <div class="db-kind">等待数据</div>
                    <div class="db-detail">点击右上角数据库按钮后显示最近记录</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入HLS.js -->
    <script src="/js/hls.min.js"></script>

    <script>
        // ========== 视频流核心配置 ==========
        const STREAM_URL = '/stream/stream.m3u8';
        const API_START_STREAM = '/api/camera/start_stream';
        const API_STOP_STREAM = '/api/camera/stop_stream';
        const API_START_RECORD = '/api/camera/start_record';
        const API_STOP_RECORD = '/api/camera/stop_record';
        const API_SNAPSHOT = '/api/camera/snapshot';

        // 全局状态
        let streamStarted = false;
        let recordStarted = false;
        let hlsInstance = null;

        // DOM元素
        const video = document.getElementById('videoPlayer');
        const streamStartBtn = document.getElementById('streamStartBtn');
        const streamStopBtn = document.getElementById('streamStopBtn');
        const snapshotBtn = document.getElementById('snapshotBtn');
        const recordBtn = document.getElementById('recordBtn');
        const dbModal = document.getElementById('dbModal');
        const dbOpenBtn = document.getElementById('dbOpenBtn');
        const dbCloseBtn = document.getElementById('dbCloseBtn');
        const protocolMqttBtn = document.getElementById('protocolMqttBtn');
        const protocolZigbeeBtn = document.getElementById('protocolZigbeeBtn');

        let currentDir = 0;
        let activeDbTab = 'sensors';
        let dbPolling = false;
        let activeProtocol = 'mqtt';

        // 写入日志函数（增强，兼容视频流日志）
        function addLog(msg) {
            const box = document.getElementById('log_box');
            const time = new Date().toLocaleTimeString();
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
            box.appendChild(line);
            box.scrollTop = box.scrollHeight; // 自动滚动到底部
        }

        // 通用请求函数
        async function sendCommand(url, options = {}) {
            try {
                const res = await fetch(url, options);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.json();
            } catch (err) {
                addLog(`接口请求失败: ${err.message}`);
                console.error('API Error:', err);
                throw err;
            }
        }

        function formatDbTime(tsMs) {
            if (!tsMs) return '--';
            const date = new Date(Number(tsMs));
            if (Number.isNaN(date.getTime())) return '--';
            return date.toLocaleString();
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function dbRow(time, kind, detail) {
            return `<div class="db-row">
                <div class="db-time">${escapeHtml(time)}</div>
                <div class="db-kind">${escapeHtml(kind)}</div>
                <div class="db-detail">${escapeHtml(detail)}</div>
            </div>`;
        }

        function dbRowHtml(time, kind, detailHtml) {
            return `<div class="db-row">
                <div class="db-time">${escapeHtml(time)}</div>
                <div class="db-kind">${escapeHtml(kind)}</div>
                <div class="db-detail">${detailHtml}</div>
            </div>`;
        }

        function renderDbRows(tab, rows) {
            const list = document.getElementById('db_list');
            if (!rows || rows.length === 0) {
                list.innerHTML = dbRow('--', '暂无记录', '等待新数据写入 SQLite');
                return;
            }
            list.innerHTML = rows.map(row => {
                if (tab === 'sensors') {
                    return dbRow(formatDbTime(row.ts_ms), row.device_id,
                        `value=${row.value}, topic=${row.topic}, payload=${row.payload}`);
                }
                if (tab === 'media') {
                    const dbUrl = row.in_db ? `/api/db/media_content?id=${row.id}` : '';
                    const dbLink = dbUrl
                        ? `<a class="db-link" href="${dbUrl}" target="_blank">数据库打开</a>`
                        : '';
                    const fileLink = row.url
                        ? `<a class="db-link" href="${escapeHtml(row.url)}" target="_blank">文件打开</a>`
                        : '';
                    return dbRowHtml(formatDbTime(row.ts_ms), row.media_type,
                        `${dbLink}${fileLink}${escapeHtml(`size=${row.content_size || 0}, ${row.file_path || ''} ${row.message || ''}`)}`);
                }
                if (tab === 'commands') {
                    const okText = Number(row.ok || 0) ? '已发布' : '未发布';
                    return dbRow(formatDbTime(row.ts_ms), row.device_id,
                        `${okText}, topic=${row.topic || '--'}, payload=${row.payload || '--'}`);
                }
                return dbRow(formatDbTime(row.ts_ms), row.level, row.message);
            }).join('');
        }

        async function refreshDatabasePanel() {
            if (!dbModal.classList.contains('open')) return;
            if (dbPolling) return;
            dbPolling = true;
            try {
                const summaryRes = await fetch('/api/db/summary', { cache: 'no-store' });
                const summary = await summaryRes.json();
                document.getElementById('db_summary').innerHTML = `
                    <div class="db-summary-item">传感器: ${summary.sensor_samples ?? 0}</div>
                    <div class="db-summary-item">媒体: ${summary.media_files ?? 0}</div>
                    <div class="db-summary-item">命令: ${summary.actuator_commands ?? 0}</div>
                    <div class="db-summary-item">日志: ${summary.runtime_logs ?? 0}</div>
                `;

                const rowsRes = await fetch(`/api/db/${activeDbTab}?limit=20`, { cache: 'no-store' });
                const rowsData = await rowsRes.json();
                renderDbRows(activeDbTab, rowsData.rows || []);
            } catch (err) {
                document.getElementById('db_list').innerHTML =
                    dbRow('--', '读取失败', err.message);
            } finally {
                dbPolling = false;
            }
        }

        function openDatabaseView() {
            dbModal.classList.add('open');
            refreshDatabasePanel();
        }

        function closeDatabaseView() {
            dbModal.classList.remove('open');
        }

        function wait(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function waitForStreamReady(timeoutMs = 12000) {
            const deadline = Date.now() + timeoutMs;
            while (Date.now() < deadline) {
                try {
                    const res = await fetch(`${STREAM_URL}?probe=${Date.now()}`, {
                        cache: 'no-store'
                    });
                    if (res.ok) return true;
                } catch (err) {
                    // The stream file may not exist yet; keep polling briefly.
                }
                await wait(1000);
            }
            return false;
        }

        // ========== 视频流控制逻辑 ==========
        async function startStream() {
            if (streamStarted) return;
            try {
                addLog('正在启动视频流...');
                await sendCommand(API_START_STREAM, { method: 'POST' });
                addLog('等待视频切片生成...');
                const ready = await waitForStreamReady();
                if (!ready) {
                    addLog('❌ 未检测到 /stream/stream.m3u8，请检查 /tmp/iotgw_gst.log');
                    return;
                }
                const streamUrl = `${STREAM_URL}?t=${Date.now()}`;

                if (Hls.isSupported()) {
                    hlsInstance = new Hls({
                        liveSyncDurationCount: 1,
                        liveMaxLatencyDurationCount: 3
                    });
                    hlsInstance.on(Hls.Events.ERROR, (event, data) => {
                        const detail = data && data.details ? data.details : 'unknown';
                        const type = data && data.type ? data.type : 'unknown';
                        addLog(`❌ HLS播放错误: ${type}/${detail}`);
                    });
                    hlsInstance.loadSource(streamUrl);
                    hlsInstance.attachMedia(video);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play().catch(e => {
                            addLog(`自动播放被阻止: ${e.message}`);
                            console.warn("Autoplay blocked:", e);
                        });
                        addLog('✅ 视频流已连接');
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = streamUrl;
                    video.addEventListener('loadedmetadata', () => {
                        video.play().catch(e => {
                            addLog(`自动播放被阻止: ${e.message}`);
                            console.warn("Autoplay blocked:", e);
                        });
                        addLog('✅ 视频流已连接（Safari）');
                    });
                } else {
                    addLog('❌ 浏览器不支持HLS视频流');
                    alert('❌ 浏览器不支持 HLS 视频流！');
                    return;
                }

                streamStarted = true;
                streamStartBtn.disabled = true;
                streamStopBtn.disabled = false;
            } catch (err) {
                addLog(`❌ 视频流启动失败: ${err.message}`);
            }
        }

        async function stopStream() {
            if (!streamStarted) return;
            try {
                addLog('正在停止视频流...');
                if (hlsInstance) {
                    hlsInstance.destroy();
                    hlsInstance = null;
                }
                video.src = '';
                await sendCommand(API_STOP_STREAM, { method: 'POST' });

                streamStarted = false;
                streamStartBtn.disabled = false;
                streamStopBtn.disabled = true;
                addLog('⏹ 视频流已停止');
            } catch (err) {
                addLog(`⚠️ 停止视频流出错: ${err.message}`);
            }
        }

        async function takeSnapshot() {
            try {
                addLog('正在拍照...');
                const result = await sendCommand(API_SNAPSHOT, { method: 'POST' });
                addLog(`✅ 拍照成功！照片已保存：${result.url || '/media/'}`);
            } catch (err) {
                addLog(`❌ 拍照失败: ${err.message}`);
            }
        }

        async function toggleRecord() {
            if (!streamStarted) {
                addLog('❌ 请先启动视频流再进行录像');
                return;
            }

            if (!recordStarted) {
                // 开始录像
                try {
                    addLog('正在启动录像...');
                    const result = await sendCommand(API_START_RECORD, { method: 'POST' });
                    recordStarted = true;
                    recordBtn.innerHTML = '⏹ 停止录制';
                    addLog(`✅ 录像已开始：${result.url || '/media/'}`);
                } catch (err) {
                    addLog(`❌ 录像启动失败: ${err.message}`);
                }
            } else {
                // 停止录像
                try {
                    addLog('正在停止录像...');
                    const result = await sendCommand(API_STOP_RECORD, { method: 'POST' });
                    recordStarted = false;
                    recordBtn.innerHTML = '🔴 视频录制';
                    addLog(`✅ 录像已保存：${result.url || '/media/'}`);
                } catch (err) {
                    addLog(`⚠️ 停止录像出错: ${err.message}`);
                }
            }
        }

        let controlBusyUntil = 0;
        let ledUpdateTimer = null;
        let motorUpdateTimer = null;

        function setActiveProtocol(protocol) {
            activeProtocol = protocol;
            protocolMqttBtn.classList.toggle('active', protocol === 'mqtt');
            protocolZigbeeBtn.classList.toggle('active', protocol === 'zigbee');
            addLog(`通讯方式切换: ${protocol === 'mqtt' ? 'MQTT' : 'ZigBee'}`);
        }

        async function sendActuatorCommand(id, payload, label) {
            controlBusyUntil = Date.now() + 1500;
            const protocolLabel = activeProtocol === 'mqtt' ? 'MQTT' : 'ZigBee';
            addLog(`${label} [${protocolLabel}]: ${JSON.stringify(payload)}`);
            if (activeProtocol === 'zigbee') {
                addLog(`ZigBee 通讯接口待接入，当前未下发 ${label}`);
                return;
            }
            try {
                const res = await fetch(`/api/actuators/${id}/set`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (!res.ok) {
                    throw new Error(result.error || `HTTP ${res.status}`);
                }
                if (result.ok) {
                    addLog(`✅ ${label} 已下发到 MQTT`);
                } else {
                    addLog(`❌ ${label} 未下发: ${JSON.stringify(result)}`);
                }
            } catch (err) {
                addLog(`❌ ${label} 失败: ${err.message}`);
            }
        }

        function updateLedBrightnessLabel() {
            document.getElementById('led_br_text').innerText = document.getElementById('led_br').value;
        }

        function updateMotorSpeedLabel() {
            document.getElementById('motor_sp_text').innerText = document.getElementById('motor_sp').value;
        }

        function scheduleLedUpdate() {
            updateLedBrightnessLabel();
            clearTimeout(ledUpdateTimer);
            ledUpdateTimer = setTimeout(updateLed, 200);
        }

        function scheduleMotorUpdate() {
            updateMotorSpeedLabel();
            clearTimeout(motorUpdateTimer);
            motorUpdateTimer = setTimeout(updateMotor, 200);
        }

        function updateLed() {
            const sw = document.getElementById('led_sw').checked ? '开启' : '关闭';
            const br = parseInt(document.getElementById('led_br').value, 10);
            updateLedBrightnessLabel();
            addLog(`LED调整: ${sw}, 亮度 ${br}%`);
            sendActuatorCommand('led', {
                on: document.getElementById('led_sw').checked ? 1 : 0,
                br
            }, 'LED控制');
        }

        function setMotorDirUI(dir) {
    currentDir = dir;

    document.getElementById('dir_f').classList.toggle('active', dir === 0);
    document.getElementById('dir_r').classList.toggle('active', dir === 1);
}

function setMotorDirUser(dir) {
    setMotorDirUI(dir);
    document.getElementById('motor_sw').checked = true;
    addLog(`电机方向切换: ${dir === 0 ? '正转' : '反转'}`);
    updateMotor();
}



        function updateMotor() {
    const sw = document.getElementById('motor_sw').checked ? '开启' : '关闭';
    const sp = parseInt(document.getElementById('motor_sp').value, 10);
    updateMotorSpeedLabel();

    addLog(
        `电机控制: ${sw}, 速度 ${sp}%, 方向 ${currentDir === 0 ? '正转' : '反转'}`
    );
    sendActuatorCommand('motor', {
        on: document.getElementById('motor_sw').checked ? 1 : 0,
        sp,
        dir: currentDir
    }, '电机控制');
}

        function updateBuzzer() {
            const on = document.getElementById('buzzer_sw').checked ? 1 : 0;
            addLog(`蜂鸣器: ${on ? '开启' : '关闭'}`);
            sendActuatorCommand('buzzer', { on }, '蜂鸣器控制');
        }
        // ========== 事件绑定 ==========
        // 视频流按钮绑定
        streamStartBtn.onclick = startStream;
        streamStopBtn.onclick = stopStream;
        snapshotBtn.onclick = takeSnapshot;
        recordBtn.onclick = toggleRecord;
        dbOpenBtn.onclick = openDatabaseView;
        dbCloseBtn.onclick = closeDatabaseView;
        protocolMqttBtn.onclick = () => setActiveProtocol('mqtt');
        protocolZigbeeBtn.onclick = () => setActiveProtocol('zigbee');
        dbModal.onclick = event => {
            if (event.target === dbModal) {
                closeDatabaseView();
            }
        };

        document.querySelectorAll('.db-tab').forEach(btn => {
            btn.onclick = () => {
                activeDbTab = btn.dataset.dbTab;
                document.querySelectorAll('.db-tab').forEach(tab => {
                    tab.classList.toggle('active', tab === btn);
                });
                refreshDatabasePanel();
            };
        });

        // 定时拉取传感器数据
        let statusPolling = false;
        async function refreshStatus() {
            if (statusPolling) return;
            statusPolling = true;
            try {
                const r = await fetch('/api/status', {
                    cache: 'no-store',
                    headers: { 'Cache-Control': 'no-cache' }
                });
                const data = await r.json();
                // 渲染传感器数据
                document.getElementById('val_temp').innerText = data.temp || '--';
                document.getElementById('val_humi').innerText = data.humi || '--';
                document.getElementById('val_light').innerText = data.light || '--';
                const irBox = document.getElementById('val_ir');
                const irValue = Number(data.ir || 0);
                const irActive = irValue > 0;
                irBox.innerText = irActive ? "☢ 有人" : "安全";
                irBox.style.color = irActive ? "var(--danger)" : "var(--success)";

                // 同步硬件状态到前端控件。用户刚操作时先不回写，避免滑条/开关被轮询覆盖。
                if (Date.now() > controlBusyUntil) {
                    document.getElementById('led_sw').checked = data.led_on === 1;
                    document.getElementById('led_br').value = data.led_br || 50;
                    updateLedBrightnessLabel();
                    document.getElementById('motor_sw').checked = data.motor_on === 1;
                    document.getElementById('motor_sp').value = data.motor_sp || 30;
                    updateMotorSpeedLabel();
                    setMotorDirUI(data.motor_dir);
                    document.getElementById('buzzer_sw').checked = data.buzzer === 1;
                }

                // 恢复连接状态
                document.getElementById('conn_status').innerText = "● 设备在线";
                document.getElementById('conn_status').style.color = "#fff";
            } catch (e) {
                document.getElementById('conn_status').innerText = "● 连接断开";
                document.getElementById('conn_status').style.color = "#ff4d4d";
                addLog(`传感器数据获取失败: ${e.message}`);
            } finally {
                statusPolling = false;
            }
        }

        refreshStatus();
        setInterval(refreshStatus, 1000);
        setInterval(refreshDatabasePanel, 3000);

        // 初始化日志
        addLog('[系统] 页面加载完成，设备控制就绪');
    </script>

</body>
