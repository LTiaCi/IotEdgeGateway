name: IoTEdgeGateway
env: rk3568

paths:
  config_root: config
  data_dir: data
  log_file: data/logs/iotgw-rk3568.log
  www_root: www

logging:
  level: info
  file_sink_enabled: true

database:
  path: data/iotgw.db

network:
  http_api:
    host: 0.0.0.0
    port: 8080
    base_path: /api
  websocket:
    path: /ws

mqtt:
  enabled: true
  broker_host: "127.0.0.1"
  broker_port: 1883
  client_id: iotgw-rk3568
  username: ""
  password: ""
  keepalive_sec: 30
  clean_session: true
  topic_prefix: "iotgw/dev/"

zigbee:
  enabled: true
  device: "/dev/ttyS4"
  baudrate: 9600

camera:
  device: "/dev/video9"
  stream_www_root: "/mnt/www"
  stream_root: "/mnt/www/stream"
  media_root: "/userdata/www"
  width: 1280
  height: 720
  fps: 10
